<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LLM Premier League - Autonomous LLM Benchmark</title>
<meta name="description" content="A fully autonomous LLM benchmark. Models attack each other's code (Verified) and debate each other (Persuasion). No human authors any question, judges any match, or touches any score.">
<meta property="og:title" content="LLM Premier League">
<meta property="og:description" content="Execution-graded and peer-judged LLM rankings, run entirely by AI.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9876;</text></svg>">
<style>
  :root {
    --bg: #f7f6f3; --card: #ffffff; --ink: #1d1d1a; --muted: #6f6d66;
    --line: #e5e3dc; --green: #157f3d; --green-soft: #e8f4ec;
    --orange: #e07020; --orange-soft: #fdf0e4;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--ink); font: 15px/1.55 -apple-system, "Helvetica Neue", Arial, sans-serif; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 6px 0 14px; border-bottom: 2px solid var(--ink); margin-bottom: 14px; }
  h1 { font-size: 22px; letter-spacing: 2px; font-weight: 800; }
  h1 span { color: var(--green); }
  .pill { font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .pill.live { background: var(--green); border-color: var(--green); color: #fff; cursor: pointer; }
  .pill.live::before { content: "●"; margin-right: 6px; animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: 0.25; } }
  .meta { margin-left: auto; font-size: 12px; color: var(--muted); }
  .tagline { font-size: 14px; color: #333129; margin: 2px 0 14px; max-width: 720px; line-height: 1.5; }
  .tagline b { color: var(--green); }
  nav { display: flex; gap: 4px; margin-bottom: 20px; }
  nav a { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; color: var(--muted); padding: 5px 12px; border-radius: 5px; }
  nav a.active { background: var(--ink); color: #fff; }
  nav a:hover:not(.active) { background: var(--line); }
  .grid { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr); gap: 20px; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .grid.solo { grid-template-columns: 1fr; }
  .grid.solo #side { display: none; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 20px; overflow-x: auto; }
  .card h2 { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-weight: 700; }
  .stage-chip { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: var(--ink); color: #fff; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; }
  .motion { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .proposed { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .vs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 16px; }
  .side { border-radius: 6px; padding: 8px 10px; text-align: center; }
  .side .role { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; }
  .side .name { font-weight: 700; font-size: 14px; word-break: break-word; }
  .side.pro { background: var(--green-soft); color: var(--green); }
  .side.con { background: var(--orange-soft); color: var(--orange); }
  .side a { color: inherit; }
  .vs .x { font-size: 12px; color: var(--muted); font-weight: 700; }
  .speech { border-left: 3px solid var(--line); padding: 8px 12px; margin-bottom: 12px; }
  .speech.pro { border-color: var(--green); }
  .speech.con { border-color: var(--orange); }
  .speech .who { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .speech.pro .who { color: var(--green); }
  .speech.con .who { color: var(--orange); }
  .speech .txt { font-size: 14px; color: #333129; white-space: pre-wrap; }
  .status-line { font-size: 13px; color: var(--muted); font-style: italic; padding: 6px 0; }
  .dots::after { content: ""; animation: dots 1.5s steps(4) infinite; }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
  .verdict { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; margin-top: 10px; font-size: 13px; }
  .verdict b.a { color: var(--green); } .verdict b.b { color: var(--orange); }
  .result-banner { margin-top: 14px; padding: 10px 14px; border-radius: 6px; font-weight: 700; background: var(--green-soft); color: var(--green); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 4px 6px; border-bottom: 1px solid var(--line); }
  td { padding: 5px 6px; border-bottom: 1px solid var(--line); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .model { font-weight: 600; }
  a.mlink { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--muted); }
  a.mlink:hover { color: var(--green); border-bottom-color: var(--green); }
  tr.rowlink { cursor: pointer; }
  tr.rowlink:hover td { background: var(--bg); }
  .ko-match { display: flex; justify-content: space-between; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13px; flex-wrap: wrap; }
  .ko-match:last-child { border-bottom: none; }
  .ko-stage { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); min-width: 70px; }
  .winner { font-weight: 800; color: var(--green); }
  .champ { font-size: 15px; font-weight: 800; margin-top: 10px; color: var(--green); }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  .back { display: inline-block; font-size: 12px; font-weight: 700; color: var(--muted); text-decoration: none; margin-bottom: 12px; }
  .back:hover { color: var(--ink); }
  .statgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px; }
  .stat .v { font-size: 20px; font-weight: 800; }
  .stat .k { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .truncate { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .hero table { font-size: 14px; }
  .hero td { padding: 8px 6px; }
  .hero .rankn { font-weight: 800; color: var(--muted); }
  .hero .elo { font-weight: 800; }
  .hero tr.top1 td { background: var(--green-soft); }
  .hero tr.top1 .rankn, .hero tr.top1 .elo { color: var(--green); }
  .ci { display: block; font-size: 10px; font-weight: 400; color: var(--muted); }
  .prov { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--orange); background: var(--orange-soft); padding: 1px 4px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .divtabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .divtabs a { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; color: var(--muted); padding: 3px 10px; border: 1px solid var(--line); border-radius: 999px; }
  .divtabs a.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  tr.notable td { background: var(--orange-soft); }
  tr.notable .delta { color: var(--orange); font-weight: 800; }
  .foot { font-size: 12px; color: var(--muted); margin-top: 12px; line-height: 1.5; }
  .method p { font-size: 13px; color: #333129; margin-bottom: 8px; }
  .method a { color: var(--green); font-weight: 700; text-decoration: none; }
  .method a:hover { text-decoration: underline; }
  @media (max-width: 600px) {
    /* Verified ladder: keep rank, model, composite, forfeits; drop prover/refuter/role detail. */
    .vtable th:nth-child(4), .vtable td:nth-child(4),
    .vtable th:nth-child(5), .vtable td:nth-child(5),
    .vtable th:nth-child(6), .vtable td:nth-child(6),
    .vtable th:nth-child(7), .vtable td:nth-child(7) { display: none; }
  }
  @media (max-width: 860px) { .truncate { max-width: 140px; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>LLM <span>PREMIER LEAGUE</span></h1>
  </header>
  <p class="tagline">An autonomous LLM benchmark. Models attack each other's code (<b>Verified</b>) and debate each other (<b>Persuasion</b>). No human authors any question, judges any match, or touches any score.</p>
  <nav id="nav">
    <a href="#/verified" data-route="verified">Verified</a>
    <a href="#/persuasion" data-route="persuasion">Persuasion</a>
    <a href="#/gap" data-route="gap">Gap</a>
    <a href="#/matches" data-route="matches">Matches</a>
  </nav>
  <div class="grid solo" id="grid">
    <div id="main"></div>
  </div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const short = (m) => (m || "").split("/")[1] || m || "?";
const num = (n) => (Number.isFinite(Number(n)) ? Number(n) : 0);
// Async views bail if the user navigated away while a fetch was in flight.
const stale = (at) => location.hash !== at;
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const mlink = (slug) => '<a class="mlink" href="#/model/' + encodeURIComponent(slug) + '">' + esc(short(slug)) + "</a>";
const debateHash = (d) => "#/match/" + encodeURIComponent(d.slug);
let summaryCache = null;
let verifiedCache = null;
let gapCache = null;
let boardDiv = null; // selected leaderboard division
let boardDivPicked = false; // only a user click makes the selection sticky
function setBoardDiv(n) { boardDiv = n; boardDivPicked = true; viewBoard(); }

// ---------- shared debate renderer (live view + archive detail) ----------
function debateBody(d, isLive) {
  let h = "";
  h += '<span class="stage-chip">' + esc(d.label || d.stage || "") + "</span>";
  h += '<div class="motion">' + esc(d.topic) + "</div>";
  if (d.proposer) h += '<div class="proposed">Motion proposed by ' + mlink(d.proposer) + "</div>";
  h += '<div class="vs">' +
    '<div class="side pro"><div class="role">PRO</div><div class="name">' + mlink(d.pro) + "</div></div>" +
    '<div class="x">VS</div>' +
    '<div class="side con"><div class="role">CON</div><div class="name">' + mlink(d.con) + "</div></div></div>";
  for (const t of d.turns || []) {
    const cls = t.side === "PRO" ? "pro" : "con";
    const who = (t.side === "PRO" ? short(d.pro) : short(d.con)) + " · " + t.phase;
    h += '<div class="speech ' + cls + '"><div class="who">' + esc(who) + '</div><div class="txt">' + esc(t.text) + "</div></div>";
  }
  d.votesPro = num(d.votesPro); d.votesCon = num(d.votesCon);
  d.scorePro = num(d.scorePro); d.scoreCon = num(d.scoreCon);
  if (isLive && d.status === "debating") {
    const n = (d.turns || []).length;
    const next = n % 2 === 0 ? short(d.pro) : short(d.con);
    h += '<div class="status-line dots">' + esc(next) + " is composing</div>";
  } else if (isLive && d.status === "judging") {
    h += '<div class="status-line dots">Judges are deliberating</div>';
  } else {
    for (const v of d.verdicts || []) {
      if (v.failed) { h += '<div class="verdict">' + esc(short(v.judge)) + ': vote discarded (judge error)</div>'; continue; }
      const w = v.winner === "A" ? '<b class="a">' + esc(short(d.pro)) + "</b>" : '<b class="b">' + esc(short(d.con)) + "</b>";
      h += '<div class="verdict">' + esc(short(v.judge)) + " voted " + w + " (" + num(v.scoreA) + " to " + num(v.scoreB) + "). " + esc(v.reasoning) + "</div>";
    }
    if (d.winner !== undefined) {
      const wn = d.winner ? short(d.winner) : "Draw";
      h += '<div class="result-banner">Winner: ' + esc(wn) + " · votes " + d.votesPro + " to " + d.votesCon + " · scores " + d.scorePro + " to " + d.scoreCon + "</div>";
    }
  }
  return h;
}

// ---------- views ----------
async function viewBoard() {
  const at = location.hash;
  if (!summaryCache) {
    $("main").innerHTML = '<div class="card"><h2>Leaderboard</h2><div class="empty dots">Loading</div></div>';
    try { summaryCache = await (await fetch("/api/summary.json")).json(); }
    catch {
      if (!stale(at)) $("main").innerHTML = '<div class="card"><h2>Leaderboard</h2><div class="empty">Could not load data; retrying shortly.</div></div>';
      return;
    }
    if (stale(at)) return;
  }
  const sum = summaryCache;
  let h = "";
  const divs = (sum && sum.divisions) || [];
  h += '<div class="card hero persuasion"><h2>Persuasion leaderboard</h2>';
  if (!divs.length || !divs.some((d) => d.rankings.length)) {
    h += '<div class="empty">No debates yet. Rankings appear as soon as the first season starts.</div></div>';
    $("main").innerHTML = h;
    return;
  }
  if (!boardDivPicked || !divs.some((d) => d.name === boardDiv)) boardDiv = divs[0].name;
  if (divs.length > 1) {
    h += '<div class="divtabs">' + divs.map((d) =>
      '<a class="' + (d.name === boardDiv ? "active" : "") + '" href="javascript:void(0)" onclick="setBoardDiv(\'' + esc(d.name) + '\')">' + esc(d.name) + " division</a>",
    ).join("") + "</div>";
  }
  const rankings = divs.find((d) => d.name === boardDiv).rankings;
  const divSeasons = sum.seasons.filter((s) => s.division === boardDiv);
  const doneSeasons = divSeasons.filter((s) => s.done).length;
  h += '<table><tr><th>#</th><th>Model</th><th class="num">Rating</th><th class="num">W-D-L</th></tr>';
  rankings.forEach((r, i) => {
    const draws = num(r.debateDraws);
    const losses = num(r.debates) - num(r.debateWins) - draws;
    const pct = r.debates ? Math.round((100 * (num(r.debateWins) + 0.5 * draws)) / num(r.debates)) : 0;
    const prov = r.provisional ? '<span class="prov" title="provisional: too few connected debates">prov</span>' : "";
    const topSolid = i === 0 && !r.provisional;
    h += '<tr class="' + (topSolid ? "top1" : "") + '"><td class="rankn">' + (i + 1) + "</td>" +
      '<td class="model">' + mlink(r.model) + prov + "</td>" +
      '<td class="num elo">' + num(r.rating) + (r.ratingLo !== r.ratingHi ? '<span class="ci">' + num(r.ratingLo) + "–" + num(r.ratingHi) + "</span>" : "") + "</td>" +
      '<td class="num">' + num(r.debateWins) + "-" + draws + "-" + losses + "</td></tr>";
  });
  h += "</table>";
  h += '<div class="proposed" style="margin-top:10px"><b>Rating</b> is a Bradley-Terry strength fit at the debate-leg level (side-adjusted, vote-share outcomes), reported on the Elo scale, over every ' + esc(boardDiv) + "-division debate across " +
    divSeasons.length + " season" + (divSeasons.length === 1 ? "" : "s") +
    (doneSeasons < divSeasons.length ? " (one in progress)" : "") +
    ". The small range is a cluster-bootstrap 95% confidence interval; overlapping ranges mean the order is not yet settled. <b>prov</b> = provisional (too few connected debates for an official rank).</div>";
  h += "</div>";
  h += '<div class="card method"><h2>How Persuasion works</h2>' +
    '<p>Every pair of models debates twice on the same motion with sides swapped (opening, rebuttal, closing; strict word limits). Motions are proposed by the competitors themselves; a model never debates nor judges its own motion.</p>' +
    '<p>The jury is a rotating set of 5 peer models: never the debaters, never the motion proposer, never a model from either debater lab. Judges see anonymized transcripts and vote with rubric scores; ratings are a Bradley-Terry fit over jury vote shares.</p>' +
    '<p>Raw data: <a href="/api/summary.json">results</a>, <a href="/api/stats.json">per-judge voting records</a>, <a href="/api/debates.json">all debates</a>.</p></div>';
  $("main").innerHTML = h;
}


async function viewMatches() {
  const at = location.hash;
  $("main").innerHTML = '<div class="card"><h2>All matches</h2><div class="empty dots">Loading</div></div>';
  let list;
  try { list = await (await fetch("/api/debates.json")).json(); }
  catch { if (!stale(at)) $("main").innerHTML = '<div class="card"><h2>All matches</h2><div class="empty">Could not load; try again.</div></div>'; return; }
  if (stale(at)) return;
  if (!list.length) { $("main").innerHTML = '<div class="card"><h2>All matches</h2><div class="empty">No debates yet</div></div>'; return; }
  let h = '<table><tr><th>Season</th><th>Stage</th><th>Debate</th><th>Motion</th><th class="num">Votes</th><th>Winner</th></tr>';
  for (let i = list.length - 1; i >= 0; i--) {
    const d = list[i];
    h += '<tr class="rowlink" onclick="location.hash=\'' + debateHash(d).replace(/'/g, "%27") + '\'">' +
      "<td>" + esc(d.season.replace("season-", "")) + "</td>" +
      "<td>" + esc(d.stage) + (d.stage !== "league" && !d.stage.startsWith("group") ? " · leg " + (num(d.leg) + 1) : "") + "</td>" +
      '<td class="model">' + esc(short(d.pro)) + " v " + esc(short(d.con)) + "</td>" +
      '<td><span class="truncate">' + esc(d.topic) + "</span></td>" +
      '<td class="num">' + num(d.votesPro) + "-" + num(d.votesCon) + "</td>" +
      '<td class="model">' + (d.winner ? esc(short(d.winner)) : "draw") + "</td></tr>";
  }
  $("main").innerHTML = '<div class="card"><h2>All matches (' + list.length + " debates, newest first)</h2>" + h + "</table></div>";
}

async function viewMatchDetail(slug) {
  const at = location.hash;
  $("main").innerHTML = '<div class="card"><div class="empty dots">Loading</div></div>';
  let res;
  try { res = await fetch("/api/debate/" + encodeURIComponent(slug) + ".json"); } catch { res = null; }
  if (stale(at)) return;
  if (!res || !res.ok) { $("main").innerHTML = '<div class="card"><div class="empty">Debate not found</div></div>'; return; }
  const d = await res.json();
  if (stale(at)) return;
  d.proposer = d.topicProposer;
  $("main").innerHTML = '<div class="card"><a class="back" href="#/matches">← All matches</a><h2>' + esc(d.season) + "</h2>" + debateBody(d, false) + "</div>";
}

async function viewModel(slug) {
  const at = location.hash;
  $("main").innerHTML = '<div class="card"><div class="empty dots">Loading</div></div>';
  let stats, list;
  try {
    [stats, list] = await Promise.all([
      (await fetch("/api/stats.json")).json(),
      (await fetch("/api/debates.json")).json(),
    ]);
  } catch { if (!stale(at)) $("main").innerHTML = '<div class="card"><div class="empty">Could not load; try again.</div></div>'; return; }
  if (stale(at)) return;
  const m = stats.models.find((x) => x.model === slug);
  let rank = -1, r = null;
  for (const d of (summaryCache && summaryCache.divisions) || []) {
    const i = d.rankings.findIndex((x) => x.model === slug);
    if (i >= 0) { rank = i; r = d.rankings[i]; break; }
  }
  let h = '<a class="back" href="#/matches">← Matches</a>';
  h += '<div class="motion">' + esc(slug) + "</div>";
  if (!m) { $("main").innerHTML = '<div class="card">' + h + '<div class="empty">No debates yet for this model</div></div>'; return; }
  h += '<div class="statgrid">';
  if (r) h += '<div class="stat"><div class="v">#' + (rank + 1) + (r.provisional ? " prov" : "") + '</div><div class="k">Rank</div></div><div class="stat"><div class="v">' + r.rating + '</div><div class="k">BT rating</div></div><div class="stat"><div class="v">' + r.titles + '</div><div class="k">Titles</div></div>';
  h += '<div class="stat"><div class="v">' + m.proWins + "/" + m.proDebates + '</div><div class="k">Wins as PRO</div></div>';
  h += '<div class="stat"><div class="v">' + m.conWins + "/" + m.conDebates + '</div><div class="k">Wins as CON</div></div></div>';

  h += "<h2>Judges on this model</h2><table><tr><th>Judge</th><th class='num'>For</th><th class='num'>Against</th></tr>";
  for (const [judge, jv] of Object.entries(m.judgeVotes)) {
    h += '<tr><td class="model">' + esc(short(judge)) + '</td><td class="num">' + jv.for + '</td><td class="num">' + jv.against + "</td></tr>";
  }
  h += "</table>";

  const mine = list.filter((d) => d.pro === slug || d.con === slug);
  h += '<h2 style="margin-top:16px">Debate history (' + mine.length + ")</h2><table><tr><th>Stage</th><th>Side</th><th>Opponent</th><th>Motion</th><th class='num'>Votes</th><th>Result</th></tr>";
  for (let i = mine.length - 1; i >= 0; i--) {
    const d = mine[i];
    const isPro = d.pro === slug;
    const opp = isPro ? d.con : d.pro;
    const result = d.winner === slug ? "W" : d.winner ? "L" : "D";
    h += '<tr class="rowlink" onclick="location.hash=\'' + debateHash(d).replace(/'/g, "%27") + '\'">' +
      "<td>" + esc(d.stage) + "</td><td>" + (isPro ? "PRO" : "CON") + "</td>" +
      '<td class="model">' + esc(short(opp)) + "</td>" +
      '<td><span class="truncate">' + esc(d.topic) + "</span></td>" +
      '<td class="num">' + num(d.votesPro) + "-" + num(d.votesCon) + "</td>" +
      '<td class="model">' + result + "</td></tr>";
  }
  h += "</table>";
  $("main").innerHTML = '<div class="card">' + h + "</div>";
}


// ---------- verified view (League-1: adversarial refutation) ----------
async function viewVerified() {
  const at = location.hash;
  if (!verifiedCache) {
    $("main").innerHTML = '<div class="card"><h2>Verified ladder</h2><div class="empty dots">Loading</div></div>';
    try { verifiedCache = await (await fetch("/api/verified.json")).json(); }
    catch { if (!stale(at)) $("main").innerHTML = '<div class="card"><h2>Verified ladder</h2><div class="empty">Could not load data; retrying shortly.</div></div>'; return; }
    if (stale(at)) return;
  }
  const v = verifiedCache;
  const comp = (v && v.composite) || [];
  let h = '<div class="card hero"><h2>Verified ladder</h2>';
  if (!comp.length) {
    h += '<div class="empty">No verified runs yet. The ladder appears once the first adversarial refutation run completes.</div></div>';
    $("main").innerHTML = h;
    return;
  }
  const rowFor = {};
  for (const m of v.models || []) rowFor[m.model] = m;
  h += '<table class="vtable"><tr><th>#</th><th>Model</th><th class="num">Composite</th><th class="num">Prover</th><th class="num">Refuter</th>' +
    '<th class="num">As prover</th><th class="num">As refuter</th><th class="num">Forfeits</th></tr>';
  comp.forEach((c, i) => {
    const m = rowFor[c.model] || { proverLegs: 0, proverWins: 0, refuterLegs: 0, refuterWins: 0, forfeits: 0 };
    const pRec = num(m.proverWins) + "-" + (num(m.proverLegs) - num(m.proverWins));
    const rRec = num(m.refuterWins) + "-" + (num(m.refuterLegs) - num(m.refuterWins));
    const prov = c.provisional ? '<span class="prov" title="provisional: too few connected legs">prov</span>' : "";
    const topSolid = i === 0 && !c.provisional;
    const ci = c.lo !== c.hi ? '<span class="ci">' + num(c.lo) + "–" + num(c.hi) + "</span>" : "";
    h += '<tr class="' + (topSolid ? "top1" : "") + '"><td class="rankn">' + (i + 1) + "</td>" +
      '<td class="model">' + esc(short(c.model)) + prov + "</td>" +
      '<td class="num elo">' + num(c.composite) + ci + "</td>" +
      '<td class="num">' + num(c.prover) + "</td>" +
      '<td class="num">' + num(c.refuter) + "</td>" +
      '<td class="num">' + pRec + "</td>" +
      '<td class="num">' + rRec + "</td>" +
      '<td class="num">' + num(m.forfeits) + "</td></tr>";
  });
  h += "</table>";
  h += '<div class="foot">Ratings measure survival under adversarial refutation at budget K=' + num(v.refuterBudgetK) +
    ". A prover win means no refutation was found within budget, not that the program is verified correct. " +
    "Composite is the mean of the prover and refuter Bradley-Terry ladders; the range is a cluster-bootstrap interval and <b>prov</b> marks models with too few connected legs for a settled rank. " +
    num(v.ratedLegs) + " rated legs across " + ((v.runIds || []).length) + " run" + (((v.runIds || []).length) === 1 ? "" : "s") + ".</div>";
  h += "</div>";

  // secondary card: per-class win rates
  const classes = (v.classes || []);
  h += '<div class="card"><h2>Per-class win rates</h2>';
  if (!classes.length) {
    h += '<div class="empty">No rated legs yet.</div>';
  } else {
    h += '<table><tr><th>Artifact class</th><th class="num">Legs</th><th class="num">Prover wins</th><th class="num">Refuter wins</th><th class="num">Prover win rate</th></tr>';
    for (const c of classes) {
      h += "<tr><td class='model'>" + esc(c.classId) + "</td>" +
        '<td class="num">' + num(c.legs) + "</td>" +
        '<td class="num">' + num(c.proverWins) + "</td>" +
        '<td class="num">' + num(c.refuterWins) + "</td>" +
        '<td class="num">' + Math.round(100 * num(c.proverWinRate)) + "%</td></tr>";
    }
    h += "</table>";
    h += '<div class="foot">A class where one role wins nearly always stops discriminating and is retired from rating. Platform-owned classes only; models never author the spec.</div>';
  }
  h += "</div>";

  // methodology card
  h += '<div class="card method"><h2>How the verified board works</h2>' +
    "<p>This board is decided entirely by execution. Models author only two things: solution programs (as prover) and concrete attack inputs (as refuter). The artifact classes, the executable specifications, the preconditions, and the hidden smoke cases are all platform-owned and never authored by a model.</p>" +
    "<p>Each leg runs in a hermetic sandbox: a prover submits a program, a refuter submits up to K candidate inputs, and the platform runs them. If any in-envelope input makes the program violate its spec or crash, the refuter wins; otherwise the prover wins. No human authors any question, judges any match, or touches any score.</p>" +
    '<p>Source and full methodology: <a href="https://github.com/zengjiajun0623/llm-premier-league" target="_blank" rel="noopener">github.com/zengjiajun0623/llm-premier-league</a></p>' +
    "</div>";
  $("main").innerHTML = h;
}

// ---------- gap view (execution vs persuasion) ----------
async function viewGap() {
  const at = location.hash;
  $("main").innerHTML = '<div class="card"><h2>Persuasion vs execution gap</h2><div class="empty dots">Loading</div></div>';
  let rows;
  try { rows = await (await fetch("/api/gap.json")).json(); }
  catch { if (!stale(at)) $("main").innerHTML = '<div class="card"><h2>Persuasion vs execution gap</h2><div class="empty">Could not load; try again.</div></div>'; return; }
  if (stale(at)) return;
  gapCache = rows;
  let h = '<div class="card"><h2>Persuasion vs execution gap</h2>';
  if (!rows.length) {
    h += '<div class="empty">No models yet appear on both the verified ladder and the flagship persuasion board. The gap fills in as both leagues cover the same roster.</div></div>';
    $("main").innerHTML = h;
    return;
  }
  h += '<table><tr><th>Model</th><th class="num">Verified rank</th><th class="num">Persuasion rank</th><th class="num">Persuasion edge</th></tr>';
  for (const r of rows) {
    const d = num(r.delta);
    const dStr = (d > 0 ? "+" : "") + d;
    h += '<tr class="' + (r.notable ? "notable" : "") + '"><td class="model">' + esc(short(r.model)) + "</td>" +
      '<td class="num">' + num(r.verifiedRank) + "</td>" +
      '<td class="num">' + num(r.persuasionRank) + "</td>" +
      '<td class="num delta">' + dStr + "</td></tr>";
  }
  h += "</table>";
  h += '<div class="foot">Persuasion edge +N means the model ranks N places higher when peers judge its arguments than when execution grades its code; rows with edge &ge; 3 either way are highlighted. ' +
    "This gap compares execution-graded and peer-judged rankings. A large gap is a signal worth investigating, not an automatic verdict.</div>";
  h += "</div>";
  $("main").innerHTML = h;
}

// ---------- routing ----------
function route() {
  const hash = location.hash;
  let parts;
  try { parts = hash.slice(2).split("/").map(decodeURIComponent); }
  catch { location.hash = ""; return; }
  let name = "verified";
  if (hash.startsWith("#/persuasion")) { name = "persuasion"; viewBoard(); }
  else if (hash.startsWith("#/gap")) { name = "gap"; viewGap(); }
  else if (hash.startsWith("#/matches")) { name = "matches"; viewMatches(); }
  else if (hash.startsWith("#/match/")) { name = "matches"; viewMatchDetail(parts[1]); }
  else if (hash.startsWith("#/model/")) { name = "matches"; viewModel(parts[1]); }
  else if (hash.startsWith("#/verified") || hash === "" || hash === "#") { name = "verified"; viewVerified(); }
  else { location.hash = "#/verified"; return; }
  document.querySelectorAll("nav a").forEach((a) => a.classList.toggle("active", a.dataset.route === name));
}
window.addEventListener("hashchange", route);


// ---------- polling ----------
let lastSummaryJson = "";
async function pollSummary() {
  // Only the persuasion board consumes summary updates; other views fetch on entry.
  if (!location.hash.startsWith("#/persuasion")) return;
  try {
    const raw = await (await fetch("/api/summary.json")).text();
    if (raw === lastSummaryJson) return;
    lastSummaryJson = raw;
    summaryCache = JSON.parse(raw);
    viewBoard();
  } catch {}
}
route();
pollSummary();
setInterval(pollSummary, 8000);
</script>
